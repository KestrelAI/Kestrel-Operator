# Default values for kestrel-operator
replicaCount: 1

image:
  repository: ghcr.io/kestrelai/kestrel-operator
  tag: latest
  pullPolicy: Always


# Pod configuration
podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

# Kestrel Cloud connection configuration
server:
  host: grpc.platform.usekestrel.ai
  port: 443
  tls:
    insecureSkipVerify: false

# JWT Authentication configuration
auth:
  # REQUIRED: JWT token for operator authentication
  # Generate this token via the Kestrel Cloud onboarding API
  token: ""

# Operator behavior configuration
operator:
  # Cilium integration settings
  cilium:
    # Set to true to disable Cilium flow collection entirely
    # Useful for clusters without Cilium or when only resource ingestion is needed
    disableFlows: false
    
    # Hubble TLS configuration for secure connections to Hubble relay
    # By default, the operator will try to use TLS to connect to Hubble
    hubble:
      tls:
        forceDisable: false
  
  # Istio integration settings  
  istio:
    # Enable Istio Access Log Service for L7 flow collection
    # When enabled, operator will start a gRPC ALS server to receive Envoy access logs
    enabled: false
    # Port for the ALS gRPC server
    alsPort: 8080

  # Datadog integration settings
  # When enabled, the operator discovers the in-cluster Datadog installation
  # and can proxy metric/event/host/log queries to the Datadog cloud API.
  datadog:
    enabled: false
    # Namespace where Datadog is deployed (auto-discovered if empty)
    namespace: ""
    # Secret name containing the API key (default: "datadog")
    secretName: ""
    # Direct overrides (skip auto-discovery entirely)
    apiKey: ""
    appKey: ""
    site: ""

  # Safe-apply configuration for Chat YAML changes
  safeApply:
    # Enable safe-apply permissions for the operator
    # When enabled, the operator will have RBAC permissions to apply approved YAML changes
    enabled: false

  # OTEL Metrics Store configuration
  # When enabled, the operator stores metrics locally for on-demand querying by agents
  otel:
    # Enable OpenTelemetry metrics receiver and local storage
    enabled: false
    # Port for the OTLP gRPC receiver (receives metrics from customer OTEL Collectors)
    receiverPort: 4317

  # Trivy container image scanning
  # When enabled, deploys a Trivy server DaemonSet on each node for local image scanning
  # via the node's container runtime socket.
  trivy:
    enabled: false
    image:
      repository: aquasecurity/trivy
      tag: "0.69.3"
      pullPolicy: IfNotPresent
    # Port for the Trivy HTTP server running on each node
    serverPort: 4954
    # Path to the container runtime socket on the host
    # Common values:
    #   containerd: /run/containerd/containerd.sock (GKE, EKS, AKS, most modern clusters)
    #   Docker:     /var/run/docker.sock
    #   CRI-O:      /var/run/crio/crio.sock (OpenShift)
    runtimeSocket: /run/containerd/containerd.sock
    # Resources for each Trivy DaemonSet pod
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi

  # Metrics store configuration (used when otel.enabled is true)
  metricsStore:
    # How long to keep metrics data (e.g., "30m", "1h")
    retention: "30m"
    # Maximum number of unique metric series to store
    maxSeries: 100000
    # Number of data points per series (should match retention / scrape interval)
    # e.g., 60 points for 30 min retention at 30s intervals
    ringSize: 60

# Health check configuration for liveness probe
healthcheck:
  # Port for the health check HTTP server (8081 to avoid conflict with Istio ALS port 8080)
  port: 8081
  
  # Liveness probe configuration
  # The liveness probe determines if the pod should be restarted
  # It will fail immediately when the gRPC stream encounters EOF errors
  livenessProbe:
    initialDelaySeconds: 30  # Wait 30 seconds after container starts
    periodSeconds: 10        # Check every 10 seconds (responsive)
    timeoutSeconds: 5        # Timeout after 5 seconds
    failureThreshold: 1      # Restart immediately on first failure (no retries)
    successThreshold: 1      # Consider healthy after 1 success
  


# Resource limits and requests - optimized for production
resources:
  limits:
    cpu: 500m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 1Gi

# Node selection and affinity
nodeSelector: {}
tolerations: []
affinity: {}

# Network Policy configuration
networkPolicy:
  create: false


# Service Account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""


certificates:
  client:
    cert: |
      # Unique client certificate generated by Kestrel Cloud
    key: |
      # Unique client private key generated by Kestrel Cloud
  ca:
    cert: |
      # CA certificate for server verification
