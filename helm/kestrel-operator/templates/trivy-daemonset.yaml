{{- if .Values.operator.trivy.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kestrel-operator.fullname" . }}-trivy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kestrel-operator.labels" . | nindent 4 }}
    component: trivy-scanner
spec:
  selector:
    matchLabels:
      {{- include "kestrel-operator.selectorLabels" . | nindent 6 }}
      component: trivy-scanner
  template:
    metadata:
      labels:
        {{- include "kestrel-operator.selectorLabels" . | nindent 8 }}
        component: trivy-scanner
    spec:
      # Trivy pods only run the scanner — they don't need K8s API access.
      # Use the default SA to avoid inheriting the operator's broad RBAC.
      serviceAccountName: default
      automountServiceAccountToken: false
      containers:
        - name: trivy-server
          image: "{{ .Values.operator.trivy.image.repository }}:{{ .Values.operator.trivy.image.tag }}"
          imagePullPolicy: {{ .Values.operator.trivy.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Downloading Trivy vulnerability DB..."
              retries=0
              until trivy image --download-db-only --cache-dir /var/trivy-cache; do
                retries=$((retries + 1))
                if [ "$retries" -ge 3 ]; then
                  echo "ERROR: Failed to download Trivy DB after $retries attempts" >&2
                  exit 1
                fi
                echo "DB download failed (attempt $retries/3), retrying in 30s..." >&2
                sleep 30
              done
              echo "DB download complete. Refreshing DB every 12 hours..."
              while true; do sleep 43200; trivy image --download-db-only --cache-dir /var/trivy-cache || echo "WARNING: DB refresh failed, will retry next cycle" >&2; done
          livenessProbe:
            exec:
              command: ["trivy", "--version"]
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -d /var/trivy-cache/db && test -r /var/trivy-cache/db"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: container-runtime-socket
              mountPath: {{ .Values.operator.trivy.runtimeSocket }}
              readOnly: true
            - name: trivy-cache
              mountPath: /var/trivy-cache
          resources:
            {{- toYaml .Values.operator.trivy.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: container-runtime-socket
          hostPath:
            path: {{ .Values.operator.trivy.runtimeSocket }}
            type: Socket
        - name: trivy-cache
          emptyDir:
            sizeLimit: 2Gi
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
