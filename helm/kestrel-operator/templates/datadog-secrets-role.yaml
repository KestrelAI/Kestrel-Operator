{{- if .Values.operator.datadog.enabled }}
---
# Role for reading Datadog API key and app key secrets.
# Scoped to the Datadog namespace with specific secret names.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-datadog-secrets
  namespace: {{ .Values.operator.datadog.namespace | default "datadog" }}
  labels:
    {{- include "kestrel-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "datadog"
      - "datadog-secret"
      - "datadog-cluster-agent"
      {{- if and .Values.operator.datadog.secretName (ne .Values.operator.datadog.secretName "datadog") (ne .Values.operator.datadog.secretName "datadog-secret") (ne .Values.operator.datadog.secretName "datadog-cluster-agent") }}
      - {{ .Values.operator.datadog.secretName | quote }}
      {{- end }}
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-datadog-secrets
  namespace: {{ .Values.operator.datadog.namespace | default "datadog" }}
  labels:
    {{- include "kestrel-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-datadog-secrets
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}

---
# Role for listing Datadog DaemonSets and Deployments during discovery.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-datadog-discovery
  namespace: {{ .Values.operator.datadog.namespace | default "datadog" }}
  labels:
    {{- include "kestrel-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments"]
    verbs: ["list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-datadog-discovery
  namespace: {{ .Values.operator.datadog.namespace | default "datadog" }}
  labels:
    {{- include "kestrel-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-datadog-discovery
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
